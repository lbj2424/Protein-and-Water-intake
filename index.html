<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitality Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        
        <section id="main-view" class="view active">
            <h1>Take me To The</h1>
            <div class="button-group">
                <button id="btn-go-water" class="nav-btn neon-blue">Water Intake</button>
                <button id="btn-go-protein" class="nav-btn neon-purple">Protein Intake</button>
            </div>
        </section>

        <section id="water-view" class="view hidden">
            <header>
                <button class="back-btn" onclick="goHome()">← Back</button>
                <h2>Hydration</h2>
            </header>
            
            <div class="content-area water-layout">
                <div class="speech-bubble" id="water-speech">I'm so dry... please log some water!</div>

                <div class="glass-container">
                    <div class="glass">
                        <div class="water-fill" id="water-fill"></div>
                        <div class="glass-face" id="glass-face">
                            <div class="eyes" id="glass-eyes">
                                <div class="eye"></div>
                                <div class="eye"></div>
                            </div>
                            <div class="mouth" id="glass-mouth"></div>
                        </div>
                    </div>
                    <div class="arm" id="glass-arm">👋</div>
                </div>

                <div class="stats-container">
                    <h1 id="water-percentage">0%</h1>
                    <p><span id="water-current" class="highlight">0</span> / 124 oz</p>
                    <p class="text-muted"><span id="water-remaining">124</span> oz needed</p>
                </div>

                <div class="input-section">
                    <h3>Enter new log</h3>
                    <div class="input-group">
                        <input type="number" id="water-input" placeholder="Ounces (e.g., 8.5)" min="0.1" step="0.1">
                        <button id="btn-add-water" class="nav-btn neon-blue small-btn">Drink!</button>
                    </div>
                </div>

                <div class="log-section">
                    <h3>Daily Log</h3>
                    <ul id="water-log-list" class="log-list">
                        </ul>
                </div>
                
                <div class="chart-section">
                    <div class="chart-header">
                        <h3>Progress History</h3>
                        <div class="chart-toggles">
                            <button class="toggle-btn active" id="water-week-btn">Week</button>
                            <button class="toggle-btn" id="water-month-btn">Month</button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="waterChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

        <section id="protein-view" class="view hidden">
            <header>
                <button class="back-btn" onclick="goHome()">← Back</button>
                <h2>Protein</h2>
            </header>
            
            <div class="content-area protein-layout">
                
                <div class="semi-circle-container">
                    <svg viewBox="0 0 100 50" class="half-circle-svg">
                        <path class="bg-path" d="M 10,45 A 40,40 0 0,1 90,45" />
                        <path class="fill-path" id="protein-fill-path" d="M 10,45 A 40,40 0 0,1 90,45" />
                    </svg>
                    <div class="protein-stats-overlay">
                        <h1 id="protein-percentage">0%</h1>
                    </div>
                </div>

                <div class="stats-container">
                    <p><span id="protein-current" class="highlight" style="color: var(--neon-purple);">0</span> / 165 g</p>
                    <p class="text-muted"><span id="protein-remaining">165</span> g needed</p>
                </div>

                <div class="input-section">
                    <h3>Log a Meal</h3>
                    
                    <div class="search-container">
                        <input type="text" id="meal-search" placeholder="🔍 Search favorite meals...">
                        <ul id="search-results" class="search-results hidden"></ul>
                    </div>

                    <div class="input-group" style="margin-top: 10px;">
                        <input type="text" id="meal-name" placeholder="Meal Name (e.g. Chicken)">
                        <input type="number" id="protein-input" placeholder="Grams" min="0.1" step="0.1" style="max-width: 100px;">
                    </div>
                    
                    <div class="favorite-checkbox">
                        <input type="checkbox" id="save-favorite">
                        <label for="save-favorite">Save as a Favorite Meal</label>
                    </div>

                    <button id="btn-add-protein" class="nav-btn neon-purple small-btn" style="width: 100%; margin-top: 15px;">Log Protein</button>
                </div>

                <div class="log-section">
                    <h3>Daily Log</h3>
                    <ul id="protein-log-list" class="log-list">
                        </ul>
                </div>
                
                <div class="chart-section">
                    <div class="chart-header">
                        <h3>Progress History</h3>
                        <div class="chart-toggles">
                            <button class="toggle-btn active" id="protein-week-btn">Week</button>
                            <button class="toggle-btn" id="protein-month-btn">Month</button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="proteinChart"></canvas>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
